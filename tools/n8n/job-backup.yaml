apiVersion: batch/v1
kind: CronJob
metadata:
  name: n8n-backup
  namespace: n8n
spec:
  schedule: "0 2 * * *"   # Todos los días a las 2 AM
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: n8n-backup
              image: alpine:3.20
              command:
                - /bin/sh
                - -c
                - |
                  TIMESTAMP=$(date +%F_%H-%M-%S)
                  BACKUP_FILE="/backup/n8n-backup-$TIMESTAMP.tar.gz"
                  
                  # Crear backup
                  tar czf "$BACKUP_FILE" -C /data .
                  echo "✅ Backup creado: $BACKUP_FILE"
                  
                  # Rotación: borrar backups de más de 5 días
                  find /backup -type f -name "n8n-backup-*.tar.gz" -mtime +5 -exec rm -f {} \;
                  echo "♻️ Rotación aplicada (conservando últimos 5 días)"
              volumeMounts:
                - name: n8n-data
                  mountPath: /data
                - name: n8n-backups
                  mountPath: /backup
          volumes:
            - name: n8n-data
              persistentVolumeClaim:
                claimName: n8n-data-pvc
            - name: n8n-backups
              persistentVolumeClaim:
                claimName: n8n-backup-pvc
